spring:
  application:
    name: ai-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/ai_platform
    username: aiuser
    password: ai_pass_2024
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_2024

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 2048
      embedding:
        options:
          model: deepseek-embedding

    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5
      embedding:
        options:
          model: nomic-embed-text

    vectorstore:
      milvus:
        client:
          host: localhost
          port: 19530
        database-name: default
        collection-name: ai_vectors
        embedding-dimension: 1536
        index-type: IVF_FLAT
        metric-type: COSINE
        initialize-schema: true

    mcp:
      client:
        enabled: false
        request-timeout: 30s

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: 8080
